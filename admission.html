<!DOCTYPE html>
<html lang="en" class="h-full bg-[#030712]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Portal - Premium Nexus UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex flex-col justify-between selection:bg-indigo-500/30 overflow-x-hidden relative">

    <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[600px] sm:w-[1000px] h-[400px] bg-gradient-to-r from-indigo-500/20 via-purple-500/10 to-pink-500/20 rounded-full blur-[140px] pointer-events-none"></div>

    <header class="border-b border-slate-900/80 bg-slate-950/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <h1 class="text-sm sm:text-base md:text-lg font-extrabold bg-gradient-to-r from-white via-indigo-200 to-indigo-400 bg-clip-text text-transparent truncate tracking-tight">
                Shaheen Developers <span class="text-indigo-400 font-medium">Admission Portal</span>
            </h1>
            <a href="dashbord.html" class="px-4 py-2 text-xs font-bold text-indigo-200 bg-slate-900/40 border border-slate-800 rounded-xl hover:bg-indigo-600/10 transition-all">Back to Dashboard</a>
        </div>
    </header>

    <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-8 space-y-8 z-10">
        
        <div class="bg-slate-900/40 border border-slate-800/60 p-1.5 rounded-2xl flex flex-col sm:flex-row items-center gap-1.5 backdrop-blur-md">
            <button onclick="switchTab('registration')" id="tab-registration" class="flex-1 text-center text-xs sm:text-sm font-bold px-4 py-3 rounded-xl cursor-pointer bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg">
                Registration Form
            </button>
            <button onclick="switchTab('idcard')" id="tab-idcard" class="flex-1 text-center text-xs sm:text-sm font-bold px-4 py-3 rounded-xl cursor-pointer text-slate-400 hover:text-slate-200 hover:bg-slate-800/40">
                Download ID Card
            </button>
            <button onclick="switchTab('result')" id="tab-result" class="flex-1 text-center text-xs sm:text-sm font-bold px-4 py-3 rounded-xl cursor-pointer text-slate-400 hover:text-slate-200 hover:bg-slate-800/40">
                Result
            </button>
        </div>

        <div class="bg-gradient-to-b from-slate-900/80 to-slate-950/80 border border-slate-800/80 rounded-2xl p-6 sm:p-8 md:p-10 backdrop-blur-xl relative">
            
            <div id="content-registration" class="space-y-6">
                <div class="border-b border-slate-800/60 pb-4">
                    <h2 class="text-xl sm:text-2xl font-extrabold text-white">Online Admission</h2>
                </div>

                <form id="admission-form" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Full Name</label>
                            <input type="text" id="student-name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 text-white">
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Father's Name</label>
                            <input type="text" id="father-name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Email Address</label>
                            <input type="email" id="student-email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 text-white">
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Mobile Number</label>
                            <input type="tel" id="mobile-number" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Select Campus</label>
                            <select id="campus" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white">
                                <option value="">Select Campus</option>
                                <option value="Karachi">Karachi</option>
                                <option value="Lahore">Lahore</option>
                                <option value="Islamabad">Islamabad</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-bold mb-2">Select Course</label>
                            <select id="course" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white">
                                <option value="">Select Course</option>
                                <option value="Web & Mobile App Dev">Web & Mobile App Dev</option>
                                <option value="Graphic Design">Graphic Design</option>
                                <option value="Digital Marketing">Digital Marketing</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-indigo-500 transition shadow-lg">
                        Submit Admission Form
                    </button>
                </form>
            </div>

            <div id="content-idcard" class="hidden space-y-6">
                <h2 class="text-xl font-bold text-white">Download ID Card</h2>
                
                <div id="search-card-container" class="space-y-4">
                    <input type="tel" id="search-mobile" placeholder="Enter Registered Mobile Number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm">
                    <button onclick="searchStudentIDCard()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-500">Search ID Card</button>
                </div>

                <div id="id-card-display-area" class="hidden space-y-4 border border-slate-800 p-4 rounded-xl bg-slate-950">
                    <div id="student-id-card" class="p-4 bg-gradient-to-br from-slate-900 to-slate-800 rounded-xl space-y-2">
                        <div><strong>Roll No:</strong> <span id="card-roll">---</span></div>
                        <div><strong>Name:</strong> <span id="card-name">---</span></div>
                        <div><strong>Father:</strong> <span id="card-father">---</span></div>
                        <div><strong>Mobile:</strong> <span id="card-mobile">---</span></div>
                        <div><strong>Campus:</strong> <span id="card-campus">---</span></div>
                        <div><strong>Course:</strong> <span id="card-course">---</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="printIDCard()" class="flex-1 bg-green-600 py-2 rounded-lg text-xs font-bold text-white">Print / Save</button>
                        <button onclick="resetSearchArea()" class="flex-1 bg-slate-800 py-2 rounded-lg text-xs font-bold text-slate-300">Search Again</button>
                    </div>
                </div>
            </div>

            <div id="content-result" class="hidden space-y-6">
                <h2 class="text-xl font-bold text-white">Examination Results</h2>
                <p class="text-slate-400 text-sm">Results section coming soon.</p>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
